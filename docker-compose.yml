services:
  event:
    container_name: event-service
    image: event-app/event
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      - db
      - redis
      - rabbitmq
    env_file: .env
    environment:
      DB_NAME: app_event_db
  inventory:
    container_name: inventory-service
    image: event-app/inventory
    ports:
      - "8081:8081"
    networks:
      - app-network
    depends_on:
      - db
      - redis
      - rabbitmq
    env_file: .env
    environment:
      DB_NAME: app_inventory_db
  order:
    container_name: order-service
    image: event-app/order
    ports:
      - "8082:8082"
    networks:
      - app-network
    depends_on:
      - db
      - redis
      - rabbitmq
    env_file: .env
    environment:
      DB_NAME: app_order_db
  payment:
    container_name: payment-service
    image: event-app/payment
    ports:
      - "8083:8083"
    networks:
      - app-network
    depends_on:
      - db
      - redis
      - rabbitmq
    env_file: .env
    environment:
      DB_NAME: app_payment_db
#  user:
#    container_name: user-service
#    image: event-app/user
#    ports:
#      - "8084:8084"
#    networks:
#      - app-network
#    depends_on:
#      - db
#      - rabbitmq
#    env_file: .env
#    environment:
#      DB_NAME: app_user_db
  db:
    container_name: db
    image: postgres:18.4
    networks:
      - app-network
    volumes:
      - db-data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    restart: always
  redis:
    container_name: redis
    image: redis:8.6.3-alpine
    networks:
      - app-network
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: always
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:4.3.0-management-alpine
    networks:
      - app-network
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    restart: always
networks:
  app-network:
volumes:
  db-data:
  redis-data:
  rabbitmq-data:
