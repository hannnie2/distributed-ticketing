server:
  port: 8082

spring:
  task:
    scheduling:
      pool:
        size: 2

  application:
    name: order

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME:app_order_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    properties:
      dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

resend:
  api-key: ${RESEND_API_KEY}
  from: ${RESEND_FROM}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.example: DEBUG
